name: trigger str-analysis docker rebuild

# On every push to master, immediately dispatch the str-analysis "build docker images" workflow to
# rebuild only the ExpansionHunter image. That image's Dockerfile fetches this fork's master branch
# fresh at build time, so the rebuild picks up the new commit.
#
# This fires right away rather than waiting for the "Build" workflow to finish. The str-analysis build
# recompiles ExpansionHunter itself, so a commit that does not compile fails there and no image is
# pushed.
#
# Requires a repository secret STR_ANALYSIS_DISPATCH_TOKEN: a personal access token with
# "Actions: read and write" permission on broadinstitute/str-analysis (the default GITHUB_TOKEN
# cannot trigger workflows in another repository).

on:
  push:
    branches:
      - master

concurrency:
  group: str-analysis-dispatch
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build_docker_images in str-analysis
        env:
          GH_TOKEN: ${{ secrets.STR_ANALYSIS_DISPATCH_TOKEN }}
        run: gh workflow run build_docker_images.yml -R broadinstitute/str-analysis -f image=docker_with_expansion_hunter
