name: Docker Build

# Builds docker/Dockerfile on every push/PR to master. On push (not PRs), also pushes the image to
# Docker Hub as weisburd/expansion-hunter:latest (the same image + tag as `make -C docker all`) and
# commits the resulting digest to docker/sha256.txt.
on:
  push:
    branches: [master]
    paths: [ehunter/**, CMakeLists.txt, docker/**, .github/workflows/docker.yml]
  pull_request:
    branches: [master]
    paths: [ehunter/**, CMakeLists.txt, docker/**, .github/workflows/docker.yml]

permissions:
  contents: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      env:
        DOCKER_BUILDKIT: "1"
      run: make -C docker build

    - name: Verify the embedded version is not "unknown"
      run: |
        # The image's ENTRYPOINT is /bin/bash, so it must be overridden here -- otherwise
        # "ExpansionHunter --version" is passed to bash as a script argument instead of exec'd.
        set +e
        VERSION_OUTPUT=$(docker run --rm --entrypoint ExpansionHunter weisburd/expansion-hunter:latest --version 2>&1)
        STATUS=$?
        set -e
        echo "$VERSION_OUTPUT"
        if [ "$STATUS" -ne 0 ] || echo "$VERSION_OUTPUT" | grep -qi "unknown"; then
          echo "::error::ExpansionHunter --version failed (exit $STATUS) or reports an unknown build date -- the git bind-mount in docker/Dockerfile isn't picking up the real commit."
          exit 1
        fi

    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub and record digest
      if: github.event_name == 'push'
      run: |
        docker push weisburd/expansion-hunter:latest
        make -C docker update_sha

    - name: Commit updated digest
      if: github.event_name == 'push'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docker/sha256.txt
        if git diff --cached --quiet; then
          echo "No digest change to commit"
          exit 0
        fi
        git commit -m "Update docker image sha256 digest [skip ci]"
        # A concurrent push to master (rare, since concurrency.group above should serialize runs on
        # the same ref) can make this a non-fast-forward; rebase onto the latest master and retry.
        for attempt in 1 2 3; do
          git push && exit 0
          echo "Push attempt ${attempt} failed; rebasing onto latest master and retrying."
          git fetch origin master
          git rebase origin/master
          sleep 5
        done
        echo "Failed to push the digest update after multiple attempts."
        exit 1
