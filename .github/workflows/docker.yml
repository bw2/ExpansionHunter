name: Docker Build

# Builds docker/Dockerfile on every push/PR to master. On push (not PRs), also pushes the image to
# Docker Hub as weisburd/expansion-hunter:latest (the same image + tag as `make -C docker all`) and
# commits the resulting digest to docker/sha256.txt.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      env:
        DOCKER_BUILDKIT: "1"
      run: make -C docker build

    - name: Verify the embedded version is not "unknown"
      run: |
        VERSION_OUTPUT=$(docker run --rm weisburd/expansion-hunter:latest ExpansionHunter --version 2>&1 || true)
        echo "$VERSION_OUTPUT"
        if echo "$VERSION_OUTPUT" | grep -qi "unknown"; then
          echo "::error::ExpansionHunter --version reports an unknown build date -- the git bind-mount in docker/Dockerfile isn't picking up the real commit."
          exit 1
        fi

    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub and record digest
      if: github.event_name == 'push'
      run: |
        docker push weisburd/expansion-hunter:latest
        make -C docker update_sha

    - name: Commit updated digest
      if: github.event_name == 'push'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docker/sha256.txt
        if git diff --cached --quiet; then
          echo "No digest change to commit"
          exit 0
        fi
        git commit -m "Update docker image sha256 digest [skip ci]"
        git push
