name: Docker Build

# Builds docker/Dockerfile (the image most people actually run ExpansionHunter from) on every push/PR
# to master. This is separate from the "Build" workflow, which only compiles the binary directly on
# the runner and never exercises the Dockerfile.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        push: false
        load: true
        tags: expansion-hunter:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Verify the embedded version is not "unknown"
      run: |
        VERSION_OUTPUT=$(docker run --rm expansion-hunter:ci ExpansionHunter --version 2>&1 || true)
        echo "$VERSION_OUTPUT"
        if echo "$VERSION_OUTPUT" | grep -qi "unknown"; then
          echo "::error::ExpansionHunter --version reports an unknown build date -- the git bind-mount in docker/Dockerfile isn't picking up the real commit."
          exit 1
        fi
